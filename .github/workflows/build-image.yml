name: 🏗️ Build Docker Images

on:
  workflow_dispatch:

jobs:
  build-video-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push video-engine
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.engine
          push: true
          tags: mohammedaligrh/video-engine:v1

  build-audio-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push audio-engine
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.audio
          push: true
          tags: mohammedaligrh/audio-engine:v1
