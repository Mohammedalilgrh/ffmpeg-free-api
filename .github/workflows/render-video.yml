name: Render Video

on:
  workflow_dispatch:
    inputs:
      ffmpeg_command:
        required: false
        type: string
        default: ''
      input_files_json:
        required: false
        type: string
        default: '{}'
      output_files_json:
        required: true
        type: string
      max_command_run_seconds:
        required: false
        type: string
        default: '300'
      input_compressed_folder:
        required: false
        type: string
        default: ''
      command_id:
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl unzip wget
          # تنزيل خط يدعم العربية
          mkdir -p /usr/local/share/fonts
          wget -q "https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-Regular.ttf" \
            -O /usr/local/share/fonts/Cairo-Regular.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-Bold.ttf" \
            -O /usr/local/share/fonts/Cairo-Bold.ttf || true
          fc-cache -f || true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install AWS CLI
        run: pip3 install awscli --quiet --break-system-packages

      - name: Render
        env:
          FFMPEG_COMMAND: ${{ github.event.inputs.ffmpeg_command }}
          INPUT_FILES_JSON: ${{ github.event.inputs.input_files_json }}
          OUTPUT_FILES_JSON: ${{ github.event.inputs.output_files_json }}
          MAX_RUN_SECONDS: ${{ github.event.inputs.max_command_run_seconds }}
          INPUT_COMPRESSED_FOLDER: ${{ github.event.inputs.input_compressed_folder }}
          COMMAND_ID: ${{ github.event.inputs.command_id }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          cat > render.mjs << 'RENDEREOF'
          import { execSync } from 'child_process';
          import fs from 'fs';
          import path from 'path';

          const env = process.env;
          const start = Date.now();
          const tempDir = '/tmp/render_' + Date.now();
          fs.mkdirSync(tempDir, { recursive: true });

          async function download(url, dest, retries = 3) {
            for (let i = 1; i <= retries; i++) {
              try {
                execSync(
                  `curl -L --retry 3 --max-time 120 --connect-timeout 30 -o "${dest}" "${url}"`,
                  { stdio: 'inherit', timeout: 180000 }
                );
                if (fs.existsSync(dest) && fs.statSync(dest).size > 0) return;
                throw new Error('File empty after download');
              } catch (e) {
                console.error(`Download attempt ${i}/${retries} failed:`, e.message);
                if (i === retries) throw new Error(`Failed to download: ${url}`);
                await new Promise(r => setTimeout(r, 3000 * i));
              }
            }
          }

          async function uploadToR2(localPath, filename) {
            const publicUrl = env.R2_PUBLIC_URL.replace(/\/$/, '') + '/' + filename;
            // بدون --acl لأن R2 لا يدعمه - الـ public access من إعدادات bucket
            execSync(
              `AWS_ACCESS_KEY_ID=${env.R2_ACCESS_KEY} ` +
              `AWS_SECRET_ACCESS_KEY=${env.R2_SECRET_KEY} ` +
              `aws s3 cp "${localPath}" "s3://${env.R2_BUCKET}/${filename}" ` +
              `--endpoint-url ${env.R2_ENDPOINT} ` +
              `--no-verify-ssl`,
              { stdio: 'inherit', timeout: 60000 }
            );
            return publicUrl;
          }

          try {
            const inputFiles  = JSON.parse(env.INPUT_FILES_JSON  || '{}');
            const outputFiles = JSON.parse(env.OUTPUT_FILES_JSON || '{}');
            let cmd = env.FFMPEG_COMMAND || '';

            if (!cmd) throw new Error('FFMPEG_COMMAND is empty');

            // تنزيل ملفات الإدخال
            const downloaded = {};
            for (const [k, url] of Object.entries(inputFiles)) {
              if (!url || !url.startsWith('http')) continue;
              const ext  = path.extname(new URL(url).pathname) || '.mp4';
              const dest = path.join(tempDir, k + ext);
              console.log(`Downloading ${k} from ${url}`);
              await download(url, dest);
              downloaded[k] = dest;
              console.log(`Downloaded ${k} → ${dest} (${fs.statSync(dest).size} bytes)`);
            }

            // تنزيل مجلد مضغوط إن وجد
            if (env.INPUT_COMPRESSED_FOLDER) {
              const zp = path.join(tempDir, 'input.zip');
              await download(env.INPUT_COMPRESSED_FOLDER, zp);
              execSync(`unzip -o "${zp}" -d ${tempDir}/input_folder`, { stdio: 'inherit' });
              downloaded['input_folder'] = path.join(tempDir, 'input_folder');
            }

            // استبدال placeholders في الأمر
            for (const [k, lp] of Object.entries(downloaded)) {
              cmd = cmd.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'g'), lp);
            }

            // تجهيز مسارات الإخراج
            const outputs = {};
            for (const [k, fn] of Object.entries(outputFiles)) {
              const op = path.join(tempDir, fn);
              outputs[k] = { path: op, filename: fn };
              cmd = cmd.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'g'), op);
            }

            console.log('Running FFmpeg command...');
            console.log('CMD:', cmd.substring(0, 200) + '...');

            const timeout = (parseInt(env.MAX_RUN_SECONDS || '300') + 60) * 1000;
            execSync(cmd, { stdio: 'inherit', timeout });

            // رفع النتائج
            for (const [k, info] of Object.entries(outputs)) {
              if (!fs.existsSync(info.path)) {
                console.error(`Output file missing: ${info.path}`);
                continue;
              }
              const size = fs.statSync(info.path).size;
              console.log(`Uploading ${k}: ${info.filename} (${size} bytes)`);
              const url = await uploadToR2(info.path, info.filename);
              console.log(`VIDEO_URL_RESULT_${k}=${url}`);
            }

          } catch (e) {
            console.error('RENDER ERROR:', e.message);
            process.exit(1);
          } finally {
            try { fs.rmSync(tempDir, { recursive: true, force: true }); } catch {}
          }

          const elapsed = ((Date.now() - start) / 1000).toFixed(1);
          console.log(`Done in ${elapsed}s`);
          console.log(`COMMAND_ID=${env.COMMAND_ID}`);
          RENDEREOF

          node render.mjs
